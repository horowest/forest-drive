<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Silent Forest - Step 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d19a8a; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 30px; left: 30px; color: #ffffff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 3px;
            font-weight: bold; text-shadow: 0px 0px 10px rgba(209, 154, 138, 0.5);
        }
        #crash-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #702020; font-size: 20px; display: none; font-weight: bold;
            background: rgba(209, 154, 138, 0.8); padding: 20px; border-radius: 5px;
        }
        .controls { position: absolute; bottom: 20px; left: 30px; color: #ffffff; font-size: 12px; opacity: 0.6; }
        #status-bar {
            position: absolute;
            top: 18px;
            left: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.85);
            color: #f8fafc;
            font-size: 13px;
            z-index: 10;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.25);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }
        .connected { background: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.6); }
        #pairing-panel {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 240px;
            padding: 18px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 24px;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 10;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.25);
        }
        #pairing-panel p {
            margin: 0;
            font-size: 13px;
            line-height: 1.6;
        }
        #qr-canvas {
            width: 100%;
            height: auto;
            border-radius: 18px;
            background: #ffffff;
        }
        .room-code {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            letter-spacing: 0.08em;
        }
        .room-code strong {
            color: #7dd3fc;
            letter-spacing: 0.1em;
        }
        #qr-loader {
            font-size: 12px;
            color: #94a3b8;
        }
        #calibration-alert {
            position: absolute;
            bottom: 90px;
            right: 18px;
            padding: 12px 16px;
            border-radius: 18px;
            background: rgba(14, 165, 233, 0.9);
            color: #f8fafc;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 10;
        }
        #calibration-alert.show { opacity: 1; }
    </style>
  <script type="module" crossorigin src="/assets/home-CsOmK-3t.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>
    <div id="status-bar">
        <span class="status-dot disconnected" id="status-dot"></span>
        <span id="status-text">WAITING FOR PHONE CONTROLLER</span>
    </div>
    <div id="pairing-panel">
        <p>Scan this QR code with your phone to use it as a wireless steering controller.</p>
        <canvas id="qr-canvas" width="200" height="200"></canvas>
        <div class="room-code"><span>ROOM</span> <strong id="room-code">------</strong></div>
        <div id="qr-loader">Generating pairing QR…</div>
    </div>
    <div id="ui">Distance: <span id="dist">0</span>m</div>
    <div id="crash-msg">OFF ROAD - STEER BACK TO ASPHALT</div>
    <div class="controls">WASD / ARROWS TO DRIVE</div>
    <div id="calibration-alert">CALIBRATED</div>

</body>
</html>
