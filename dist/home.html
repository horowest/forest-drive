<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Silent Forest - Step 3</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #d19a8a; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            bottom: 30px;
            right: 30px;
            left: auto;
            display: flex;
            align-items: flex-end;
            gap: 30px;
            color: rgba(255, 255, 255, 0.88);
            pointer-events: none;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.05;
            letter-spacing: 0.02em;
            text-shadow: 0 0 18px rgba(255, 255, 255, 0.12);
        }
        #ui .hud-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
        }
        #ui .hud-label {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.22em;
            opacity: 0.55;
        }
        #ui .hud-value {
            font-size: 2.6rem;
            font-weight: 500;
            letter-spacing: 0.04em;
        }
        #ui .hud-unit {
            margin-left: 0.4rem;
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.7;
        }
        #ui .hud-value strong {
            font-weight: 700;
        }
        #crash-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #f8f0e8; font-size: 20px; display: none; font-weight: 700;
            background: rgba(209, 154, 138, 0.88); padding: 20px; border-radius: 8px;
        }
        .controls { position: absolute; bottom: 20px; left: 30px; color: #ffffff; font-size: 12px; opacity: 0.6; }
        #status-bar {
            position: absolute;
            top: 18px;
            left: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.85);
            color: #f8fafc;
            font-size: 13px;
            z-index: 10;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.25);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }
        .connected { background: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.6); }
        #pairing-panel {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 240px;
            padding: 18px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 24px;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 10;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.25);
        }
        #pairing-panel p {
            margin: 0;
            font-size: 13px;
            line-height: 1.6;
        }
        #qr-canvas {
            width: 100%;
            height: auto;
            border-radius: 18px;
            background: #ffffff;
        }
        .room-code {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            letter-spacing: 0.08em;
        }
        .room-code strong {
            color: #7dd3fc;
            letter-spacing: 0.1em;
        }
        #qr-loader {
            font-size: 12px;
            color: #94a3b8;
        }
        #calibration-alert {
            position: absolute;
            bottom: 90px;
            right: 18px;
            padding: 12px 16px;
            border-radius: 18px;
            background: rgba(14, 165, 233, 0.9);
            color: #f8fafc;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 10;
        }
        #calibration-alert.show { opacity: 1; }
        #audio-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 20px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.88);
            color: #f8fafc;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }
    </style>
  <script type="module" crossorigin src="/assets/home-9ERv9Cs7.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/browser-CjSdxGTc.js">
</head>
<body>
    <div id="status-bar">
        <span class="status-dot disconnected" id="status-dot"></span>
        <span id="status-text">WAITING FOR PHONE CONTROLLER</span>
    </div>
    <div id="pairing-panel">
        <p>Scan this QR code with your phone to use it as a wireless steering controller.</p>
        <canvas id="qr-canvas" width="200" height="200"></canvas>
        <div class="room-code"><span>ROOM</span> <strong id="room-code">------</strong></div>
        <div id="qr-loader">Generating pairing QR…</div>
    </div>
    <div id="audio-prompt">Tap or click to enable sound</div>
    <div id="ui">
        <div class="hud-item">
            <div class="hud-label">Distance</div>
            <div class="hud-value"><strong id="dist">0</strong><span class="hud-unit">m</span></div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Speed</div>
            <div class="hud-value"><strong id="speed-ui">0</strong><span class="hud-unit">km/h</span></div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Steering</div>
            <div class="hud-value"><strong id="steer">0</strong><span class="hud-unit">°</span></div>
        </div>
    </div>
    <div id="crash-msg">OFF ROAD - STEER BACK TO ASPHALT</div>
    <div class="controls">WASD / ARROWS TO DRIVE</div>
    <div id="calibration-alert">CALIBRATED</div>

</body>
</html>
